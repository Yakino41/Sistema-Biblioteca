server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota que não seja um arquivo real cai no index.html,
    # para o react-router-dom cuidar da navegação no lado do cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
